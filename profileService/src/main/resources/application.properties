spring.application.name=PROFILE-SERVICE
server.port=8081

# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

# Auth0 Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-l4og12lsekqwkqbp.us.auth0.com/

# GitHub API Configuration (optional)
github.api.url=https://api.github.com

# Feign Client Logging
logging.level.com.codefolio.profileService.Clients.GitHubClient=DEBUG
feign.client.config.default.loggerLevel=full

# Logging
logging.level.com.codefolio.profileService=DEBUG
